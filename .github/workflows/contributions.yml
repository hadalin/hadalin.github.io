name: Contributions graph

on:
  schedule:
    - cron: '20 4 * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/scripts/contributions.py'
      - '.github/workflows/contributions.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate SVG
        run: python3 .github/scripts/contributions.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_LOGIN: hadalin
          GITLAB_USER: primoz.hadalin

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/img/contributions.svg
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update contributions graph"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge Cloudflare cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          "${GITHUB_WORKSPACE}/.github/scripts/main.sh"
        env:
          CFZ: ${{ secrets.CFZ }}
          CFK: ${{ secrets.CFK }}
